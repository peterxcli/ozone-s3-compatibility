name: ozone-s3-compatibility

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      publish_pages:
        description: "Push the generated report to gh-pages"
        required: false
        default: false
        type: boolean
      ozone_ref:
        description: "Ozone ref to test"
        required: false
        default: "master"
        type: string
      s3_tests_args:
        description: "pytest selection for s3-tests"
        required: false
        default: "s3tests/functional"
        type: string
      mint_mode:
        description: "Mint mode"
        required: false
        default: "core"
        type: choice
        options:
          - core
          - full
      mint_targets:
        description: "Optional Mint SDK targets, space separated"
        required: false
        default: ""
        type: string
      ozone_datanodes:
        description: "Number of Ozone datanodes to start"
        required: false
        default: "1"
        type: string

permissions:
  contents: write

concurrency:
  group: ozone-s3-compatibility-pages
  cancel-in-progress: false

env:
  PUBLISH_PAGES: ${{ github.event_name == 'schedule' || github.event.inputs.publish_pages == true || github.event.inputs.publish_pages == 'true' || inputs.publish_pages == true || inputs.publish_pages == 'true' || false }}
  OUTPUT_ROOT: ${{ github.workspace }}/out/run
  WORK_DIR: ${{ github.workspace }}/.work
  OZONE_REPO: https://github.com/apache/ozone.git
  OZONE_REF: ${{ inputs.ozone_ref || 'master' }}
  S3_TESTS_REPO: https://github.com/ceph/s3-tests.git
  S3_TESTS_SOURCE: ${{ github.workspace }}/s3-tests
  S3_TESTS_REF: submodule
  S3_TESTS_ARGS: ${{ inputs.s3_tests_args || 's3tests/functional' }}
  MINT_REPO: https://github.com/minio/mint.git
  MINT_SOURCE: ${{ github.workspace }}/mint
  MINT_REF: submodule
  MINT_MODE: ${{ inputs.mint_mode || 'core' }}
  MINT_TARGETS: ${{ inputs.mint_targets || '' }}
  OZONE_DATANODES: ${{ inputs.ozone_datanodes || '1' }}
  OZONE_BUILD_ARGS: -Pdist -Dmaven.javadoc.skip=true -DskipRecon

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1
          submodules: recursive

      - name: Clean generated workspace state
        run: |
          rm -rf .pages-repo out/run out/pages .work

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install workflow dependencies
        run: |
          missing=()
          command -v jq >/dev/null 2>&1 || missing+=("jq")
          command -v mvn >/dev/null 2>&1 || missing+=("maven")
          command -v rsync >/dev/null 2>&1 || missing+=("rsync")
          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi
          mvn -version | head -n 2
          docker compose version || docker-compose --version

      - name: Build Pages frontend
        run: |
          set -euo pipefail
          npm --prefix site ci
          npm --prefix site run build

      - name: Initialize nightly run context
        id: init
        run: bash scripts/nightly/init.sh

      - name: Prepare gh-pages checkout
        if: ${{ env.PUBLISH_PAGES == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .pages-repo
          else
            git init .pages-repo
            git -C .pages-repo checkout -b gh-pages
            git -C .pages-repo remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

      - name: Clone and patch upstream suites
        run: bash scripts/nightly/clone_sources.sh

      - name: Build Ozone distribution
        run: bash scripts/nightly/build_ozone.sh

      - name: Start Ozone cluster
        id: start_cluster
        run: bash scripts/nightly/start_cluster.sh

      - name: Run s3-tests
        if: ${{ steps.start_cluster.outcome == 'success' }}
        run: bash scripts/nightly/run_s3_tests.sh

      - name: Run Mint
        if: ${{ steps.start_cluster.outcome == 'success' }}
        run: bash scripts/nightly/run_mint.sh

      - name: Stop Ozone cluster
        if: ${{ always() && hashFiles('out/run/state/exports.env') != '' }}
        run: bash scripts/nightly/stop_cluster.sh

      - name: Normalize nightly run
        if: ${{ always() && hashFiles('out/run/state/exports.env') != '' }}
        run: bash scripts/nightly/normalize_run.sh

      - name: Build Pages preview
        if: ${{ always() && hashFiles('out/run/**') != '' }}
        run: |
          set -euo pipefail
          existing_runs=""
          if [ -d ".pages-repo/data/runs" ]; then
            existing_runs="--existing-runs-dir .pages-repo/data/runs"
          fi
          python3 scripts/build_pages.py \
            --output-dir out/pages \
            --new-run out/run \
            ${existing_runs}

      - name: Explain publish gate
        if: ${{ always() }}
        env:
          DEBUG_GITHUB_INPUT_PUBLISH_PAGES: ${{ github.event.inputs.publish_pages || '' }}
          DEBUG_INPUT_PUBLISH_PAGES: ${{ inputs.publish_pages || '' }}
        run: |
          set -euo pipefail
          run_json_exists=false
          pages_index_exists=false
          if [ -f out/run/run.json ]; then
            run_json_exists=true
          fi
          if [ -f out/pages/index.html ]; then
            pages_index_exists=true
          fi

          echo "Publish gate debug:"
          echo "  github.event_name=${GITHUB_EVENT_NAME}"
          echo "  github.event.inputs.publish_pages=${DEBUG_GITHUB_INPUT_PUBLISH_PAGES}"
          echo "  inputs.publish_pages=${DEBUG_INPUT_PUBLISH_PAGES}"
          echo "  env.PUBLISH_PAGES=${PUBLISH_PAGES}"
          echo "  init.outcome=${{ steps.init.outcome }}"
          echo "  start_cluster.outcome=${{ steps.start_cluster.outcome }}"
          echo "  out/run/run.json=${run_json_exists}"
          echo "  out/run directory=$( [ -d out/run ] && echo true || echo false )"
          echo "  out/pages/index.html=${pages_index_exists}"

          if [ "${PUBLISH_PAGES}" != "true" ]; then
            echo "Publish would be skipped because PUBLISH_PAGES is not true."
          elif [ "${pages_index_exists}" != "true" ]; then
            echo "Publish would be skipped because out/pages/index.html is missing."
          else
            echo "Publish gate satisfied."
          fi

      - name: Upload report artifacts
        if: ${{ always() }}
        continue-on-error: ${{ env.ACT == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-run-${{ steps.init.outputs.run_id || github.run_id }}
          path: |
            out/run
            out/pages
          if-no-files-found: warn

      - name: Publish gh-pages
        if: ${{ always() && hashFiles('out/pages/index.html') != '' && env.PUBLISH_PAGES == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rsync -a --delete --exclude '.git/' out/pages/ .pages-repo/
          touch .pages-repo/.nojekyll
          git -C .pages-repo config user.name "github-actions[bot]"
          git -C .pages-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .pages-repo add .
          if git -C .pages-repo diff --cached --quiet; then
            echo "No Pages changes to publish"
            exit 0
          fi
          git -C .pages-repo commit -m "Nightly compatibility report for ${{ steps.init.outputs.run_id || github.run_id }}"
          git -C .pages-repo push --force origin gh-pages
