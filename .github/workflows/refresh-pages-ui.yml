name: refresh-pages-ui

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ozone-s3-compatibility-pages-ui
  cancel-in-progress: false

jobs:
  refresh-pages-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Pages data dependencies
        run: uv sync --locked

      - name: Build Pages frontend
        run: |
          set -euo pipefail
          npm --prefix site ci
          VITE_REPORT_DATA_FORMAT=parquet npm --prefix site run build

      - name: Prepare gh-pages checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "${remote_url}" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "${remote_url}" .pages-repo
          else
            git init .pages-repo
            git -C .pages-repo checkout -b gh-pages
            git -C .pages-repo remote add origin "${remote_url}"
          fi

      - name: Refresh published UI assets
        run: |
          set -euo pipefail
          source_dir="site/dist"
          if [ -d .pages-repo/data/runs ] && find .pages-repo/data/runs \( -name '*.json' -o -name metadata.parquet \) | grep -q .; then
            if find .pages-repo/data/runs -maxdepth 1 -name '*.json' | grep -q .; then
              latest_run="$(find .pages-repo/data/runs -maxdepth 1 -name '*.json' | sort | tail -n 1)"
            else
              latest_run="$(dirname "$(find .pages-repo/data/runs -mindepth 2 -maxdepth 2 -name metadata.parquet | sort | tail -n 1)")"
            fi
            uv run python scripts/build_pages.py \
              --output-dir out/pages-ui-refresh \
              --new-run "${latest_run}" \
              --existing-runs-dir .pages-repo/data/runs \
              --data-format parquet
            source_dir="out/pages-ui-refresh"
          fi

          rsync -a --delete --exclude '.git/' "${source_dir}/" .pages-repo/
          touch .pages-repo/.nojekyll

      - name: Commit and push gh-pages
        run: |
          set -euo pipefail
          git -C .pages-repo config user.name "github-actions[bot]"
          git -C .pages-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .pages-repo add -A
          if git -C .pages-repo diff --cached --quiet; then
            echo "No UI changes to publish"
            exit 0
          fi

          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          git -C .pages-repo commit -m "Refresh Pages UI from ${short_sha}"
          git -C .pages-repo push origin gh-pages
