      <rect width="470" height="228" rx="26" fill="url(#card)" stroke="#d7e2ee" />
      <text x="24" y="38" font-size="15" font-weight="800" letter-spacing="2.5" fill="#0b6286">S3-TESTS</text>
      <text x="24" y="86" font-size="22" font-weight="700">711 eligible cases</text>
      <text x="24" y="152" font-size="58" font-weight="500">28.3%</text>
      <text x="24" y="192" font-size="18" font-weight="500" fill="#60758e">201 passed, 510 failed/error, 79 skipped</text>
      <text x="24" y="216" font-size="18" font-weight="800" fill="#0f9d71">+0.0 pts vs previous</text>
