    <g transform="translate(60 510)">
      <rect width="117" height="40" rx="20" fill="#0f9d71" fill-opacity="0.10" stroke="#0f9d71" stroke-opacity="0.24" />
      <text x="20" y="26" fill="#0f9d71">completed</text>
    </g>
  </g>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#12263f">

