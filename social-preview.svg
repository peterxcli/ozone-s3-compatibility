      <text x="24" y="38" font-size="15" font-weight="800" letter-spacing="2.5" fill="#0b6286">MINT</text>
      <text x="24" y="86" font-size="22" font-weight="700">46 eligible cases</text>
      <text x="24" y="152" font-size="58" font-weight="500">82.6%</text>
      <text x="24" y="192" font-size="18" font-weight="500" fill="#60758e">38 passed, 8 failed/error, 0 skipped</text>
      <text x="24" y="216" font-size="18" font-weight="800" fill="#d2493a">-2.0 pts vs previous</text>
